name: Crawl and Post News

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '30 3 * * *'
    - cron: '0 7 * * *'
    - cron: '30 10 * * *'
    - cron: '0 14 * * *'
    - cron: '30 17 * * *'
    - cron: '0 21 * * *'
  
  workflow_dispatch:

jobs:
  crawl-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # ⬅️ Đổi từ 18 sang 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run crawler
        run: node src/index.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}